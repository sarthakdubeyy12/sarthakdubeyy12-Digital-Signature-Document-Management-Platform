services:
  # MongoDB Database
  mongo:
    image: mongo:7.0
    container_name: digital-signature-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    networks:
      - app-network
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: digital-signature-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Backend API
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: digital-signature-api
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      NODE_ENV: development
      PORT: 5001
      DATABASE_URL: mongodb://mongo:27017/digital-signature-platform?replicaSet=rs0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      JWT_SECRET: cfjvfgvy6yf86ryfc7vy6ybur6c6tf6yhygcdcfugewfeyufrgf7rfgrfe7fyewvfewfyegrfrefgyerfeygfewfygwef
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      JWT_REFRESH_SECRET: ygfhvwefyvfy6efd7yefge7fydegvhcdchvdvgdhgyhfegfyfewygfe7fegyhfvwef7efyffhdvfyehfrugbuguby
      PASSWORD_RESET_EXPIRY: 1h
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: debug
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_SECURE: false
      SMTP_USER: noreply@example.com
      SMTP_PASSWORD: dummy-password-for-development
      EMAIL_FROM: noreply@digitalsignature.com
      EMAIL_FROM_NAME: Digital Signature Platform
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    command: npm run dev
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy (Optional - commented out due to macOS file sharing)
  # nginx:
  #   image: nginx:alpine
  #   container_name: digital-signature-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - api
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
  mongo-config:
    driver: local
  redis-data:
    driver: local
